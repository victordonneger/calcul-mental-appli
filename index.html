<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MindMath">
    
    <title>MindMath - Midnight Zero-Latency</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* =========================================
           THÈME : MIDNIGHT AESTHETIC
           ========================================= */
        :root {
            --bg-pure: #000000;
            --surface: #111111;
            --surface-hover: #1A1A1A;
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
            --cyan: #06B6D4;
            --cyan-dim: rgba(6, 182, 212, 0.15);
            --red: #EF4444;
            --red-dim: rgba(239, 68, 68, 0.2);
        }

        /* =========================================
           RESET & ZÉRO SCROLL STRICT
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none; 
            touch-action: manipulation; 
        }

        html, body {
            width: 100vw;
            height: 100dvh; /* dvh s'adapte parfaitement à l'interface Safari dynamique */
            background-color: var(--bg-pure);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Zéro scroll garanti */
            position: fixed; /* Bloque l'effet d'élastique natif d'iOS */
        }

        #app {
            width: 100%;
            height: 100%;
        }

        /* Gestion Flexbox Stricte pour éviter les chevauchements */
        .screen {
            display: none; /* Remplacement de position: absolute */
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* =========================================
           ACCUEIL (HOME SCREEN)
           ========================================= */
        #home-screen {
            padding-top: calc(env(safe-area-inset-top) + 15px);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .header-title {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-main);
            margin-bottom: 15px;
            flex-shrink: 0;
        }
        .header-title span { color: var(--cyan); }

        /* Graphique calibré à 25vh */
        .chart-wrapper {
            height: 25vh;
            min-height: 140px;
            margin: 0 20px 20px 20px;
            background: var(--surface);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        /* Sélecteur de temps */
        .time-selector {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 0 20px 20px 20px;
            flex-shrink: 0;
        }

        .time-btn {
            flex: 1;
            background: var(--surface);
            border: 2px solid transparent;
            color: var(--text-dim);
            padding: 14px 0;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .time-btn.active {
            background: var(--cyan-dim);
            color: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 0 0 15px var(--cyan-dim);
        }

        /* Grille des modes harmonisée (Carrés parfaits) */
        .mode-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px 20px 20px;
            align-content: center;
        }

        .mode-btn {
            background: var(--surface);
            border: none;
            border-radius: 20px;
            color: var(--text-main);
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; /* Carrés parfaits */
            transition: transform 0.1s, background 0.1s;
        }

        .mode-btn:active { background: var(--surface-hover); transform: scale(0.95); }

        .mode-btn.mixte {
            grid-column: span 2;
            aspect-ratio: auto; /* Le bouton mixte s'adapte en hauteur */
            height: 70px;
            background: var(--cyan);
            color: var(--bg-pure);
            font-size: 20px;
            font-weight: 800;
        }
        .mode-btn.mixte:active { opacity: 0.8; }

        /* =========================================
           ÉCRAN DE JEU (GAME SCREEN)
           ========================================= */
        #game-screen {
            padding-top: calc(env(safe-area-inset-top) + 30px);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .status-bar {
            padding: 0 25px;
            flex-shrink: 0;
        }

        .status-text {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        #ui-timer { color: var(--text-main); font-variant-numeric: tabular-nums; }
        
        /* Jauge Dynamique Fixée */
        .progress-track {
            width: 100%;
            height: 10px; /* Visibilité augmentée */
            background: var(--surface);
            border-radius: 5px;
            overflow: visible; /* Permet à la lueur de dépasser */
        }

        #ui-progress {
            height: 100%;
            width: 100%;
            background: var(--cyan);
            border-radius: 5px;
            box-shadow: 0 0 12px var(--cyan); /* Effet Néon */
            transition: width 1s linear, background-color 0.3s, box-shadow 0.3s;
        }

        /* Focus : Centrage Mathématique Parfait */
        .focus-zone {
            flex: 1; /* Occupe tout l'espace disponible entre la jauge et le clavier */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .equation {
            font-size: 76px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
        }

        .user-input {
            font-size: 60px;
            color: var(--cyan);
            font-weight: 700;
            min-height: 75px; 
            margin-top: 15px;
            text-shadow: 0 0 20px var(--cyan-dim);
        }

        /* Clavier ancré */
        .numpad {
            padding: 10px 15px max(15px, env(safe-area-inset-bottom)); /* Sécurité iOS */
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            flex-shrink: 0;
            background: var(--bg-pure);
        }

        .key {
            background: var(--surface);
            border: none;
            border-radius: 16px;
            color: var(--text-main);
            font-size: 32px;
            font-weight: 500;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key:active { background: var(--surface-hover); }
        .key.action { background: #1A1A1A; color: var(--text-dim); font-size: 28px;}

        /* =========================================
           ÉCRAN DE RÉSULTAT
           ========================================= */
        #result-screen {
            padding-top: calc(env(safe-area-inset-top) + 30px);
            padding-bottom: env(safe-area-inset-bottom);
            align-items: center;
            justify-content: center;
        }

        .result-title { font-size: 24px; color: var(--text-dim); margin-bottom: 20px; font-weight: 600;}
        .score-huge { font-size: 100px; font-weight: 800; color: var(--cyan); line-height: 1; text-shadow: 0 0 30px var(--cyan-dim);}
        .score-sub { font-size: 18px; color: var(--text-dim); margin-top: 15px; margin-bottom: 60px; text-align: center; line-height: 1.5;}
        
        .btn-home {
            background: transparent;
            border: 2px solid var(--cyan);
            color: var(--cyan);
            padding: 20px 0;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            width: 85%;
            max-width: 320px;
            transition: background 0.2s;
        }
        .btn-home:active { background: var(--cyan-dim); }

    </style>
</head>
<body>

<div id="app">
    
    <div id="home-screen" class="screen active">
        <h1 class="header-title">Mind<span>Math</span></h1>
        
        <div class="chart-wrapper">
            <canvas id="historyChart"></canvas>
        </div>

        <div class="time-selector">
            <button id="btn-time-30" class="time-btn" onclick="selectTime(30)">30s</button>
            <button id="btn-time-60" class="time-btn active" onclick="selectTime(60)">60s</button>
            <button id="btn-time-120" class="time-btn" onclick="selectTime(120)">120s</button>
        </div>

        <div class="mode-grid">
            <button class="mode-btn" onclick="launchGame('Addition')">Addition</button>
            <button class="mode-btn" onclick="launchGame('Soustraction')">Soustraction</button>
            <button class="mode-btn" onclick="launchGame('Multiplication')">Multiplication</button>
            <button class="mode-btn" onclick="launchGame('Division')">Division</button>
            <button class="mode-btn mixte" onclick="launchGame('Mixte')">Défi Mixte</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="status-bar">
            <div class="status-text">
                <span id="ui-score">Score: 0</span>
                <span id="ui-timer">60s</span>
            </div>
            <div class="progress-track">
                <div id="ui-progress"></div>
            </div>
        </div>
        
        <div class="focus-zone">
            <div id="ui-equation" class="equation">...</div>
            <div id="ui-input" class="user-input"></div>
        </div>

        <div class="numpad">
            <button class="key" onclick="typeKey(1)">1</button>
            <button class="key" onclick="typeKey(2)">2</button>
            <button class="key" onclick="typeKey(3)">3</button>
            <button class="key" onclick="typeKey(4)">4</button>
            <button class="key" onclick="typeKey(5)">5</button>
            <button class="key" onclick="typeKey(6)">6</button>
            <button class="key" onclick="typeKey(7)">7</button>
            <button class="key" onclick="typeKey(8)">8</button>
            <button class="key" onclick="typeKey(9)">9</button>
            <button class="key action" onclick="clearInput()">C</button>
            <button class="key" onclick="typeKey(0)">0</button>
            <button class="key action" onclick="deleteKey()">⌫</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2 class="result-title">Temps écoulé</h2>
        <div id="ui-final-score" class="score-huge">0</div>
        <div id="ui-final-stats" class="score-sub">Précision: 0%<br>Mode Mixte (60s)</div>
        <button class="btn-home" onclick="returnHome()">Retour au menu</button>
    </div>

</div>

<script>
    /* =========================================
       LOGIQUE D'APPLICATION
       ========================================= */
    const UI = {
        screens: {
            home: document.getElementById('home-screen'),
            game: document.getElementById('game-screen'),
            result: document.getElementById('result-screen')
        },
        equation: document.getElementById('ui-equation'),
        input: document.getElementById('ui-input'),
        timer: document.getElementById('ui-timer'),
        score: document.getElementById('ui-score'),
        progress: document.getElementById('ui-progress'),
        finalScore: document.getElementById('ui-final-score'),
        finalStats: document.getElementById('ui-final-stats')
    };

    let GAME = {
        selectedDuration: 60,
        mode: '',
        score: 0,
        questionsAnswered: 0,
        timeLeft: 0,
        timerInterval: null,
        expectedAnswer: null,
        currentInput: ''
    };

    let myChart = null;

    /* --- Navigation --- */
    function showScreen(name) {
        Object.values(UI.screens).forEach(s => s.classList.remove('active'));
        UI.screens[name].classList.add('active');
    }

    function selectTime(seconds) {
        GAME.selectedDuration = seconds;
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-time-' + seconds).classList.add('active');
    }

    function returnHome() {
        showScreen('home');
        renderChart(); // On render le graph APRES l'affichage flex pour garantir ses dimensions
    }

    /* --- Moteur de Jeu --- */
    function launchGame(mode) {
        GAME.mode = mode;
        GAME.score = 0;
        GAME.questionsAnswered = 0;
        GAME.timeLeft = GAME.selectedDuration;
        GAME.currentInput = '';
        
        // Réinitialisation stricte de la jauge UI
        UI.progress.style.transition = 'none'; // Coupe l'animation pour le reset instantané
        UI.progress.style.width = '100%';
        UI.progress.style.backgroundColor = 'var(--cyan)';
        UI.progress.style.boxShadow = '0 0 12px var(--cyan)';
        
        // Force le reflow pour appliquer le reset immédiatement
        void UI.progress.offsetWidth; 
        
        // Réactive la transition pour le déroulement de la partie
        UI.progress.style.transition = 'width 1s linear, background-color 0.3s, box-shadow 0.3s';
        
        refreshTopBar();
        generateMath();
        showScreen('game');

        GAME.timerInterval = setInterval(gameTick, 1000);
    }

    function gameTick() {
        GAME.timeLeft--;
        refreshTopBar();

        if (GAME.timeLeft <= 0) {
            endGame();
        }
    }

    function refreshTopBar() {
        UI.timer.innerText = `${GAME.timeLeft}s`;
        UI.score.innerText = `Score: ${GAME.score}`;
        
        // Calcul et mise à jour de la Jauge
        const percentage = (GAME.timeLeft / GAME.selectedDuration) * 100;
        UI.progress.style.width = `${percentage}%`;
        
        // Virage au rouge sous 25% du temps restant
        if (percentage <= 25) {
            UI.progress.style.backgroundColor = 'var(--red)';
            UI.progress.style.boxShadow = '0 0 12px var(--red)';
            UI.timer.style.color = 'var(--red)';
        } else {
            UI.timer.style.color = 'var(--text-main)';
        }
    }

    function generateMath() {
        let n1, n2, op, ans;
        let activeMode = GAME.mode === 'Mixte' 
            ? ['Addition', 'Soustraction', 'Multiplication', 'Division'][Math.floor(Math.random() * 4)] 
            : GAME.mode;

        switch(activeMode) {
            case 'Addition':
                n1 = Math.floor(Math.random() * 45) + 5; n2 = Math.floor(Math.random() * 45) + 5;
                op = '+'; ans = n1 + n2; break;
            case 'Soustraction':
                n1 = Math.floor(Math.random() * 50) + 20; n2 = Math.floor(Math.random() * (n1 - 5)) + 1;
                op = '-'; ans = n1 - n2; break;
            case 'Multiplication':
                n1 = Math.floor(Math.random() * 11) + 2; n2 = Math.floor(Math.random() * 11) + 2;
                op = '×'; ans = n1 * n2; break;
            case 'Division':
                n2 = Math.floor(Math.random() * 10) + 2; ans = Math.floor(Math.random() * 10) + 2;
                n1 = n2 * ans; op = '÷'; break;
        }

        GAME.expectedAnswer = ans;
        GAME.currentInput = '';
        UI.equation.innerText = `${n1} ${op} ${n2} =`;
        UI.input.innerText = '';
    }

    /* --- Clavier Numérique --- */
    function typeKey(num) {
        if (GAME.currentInput.length < 5) {
            GAME.currentInput += num;
            UI.input.innerText = GAME.currentInput;
            verifyAnswer();
        }
    }

    function deleteKey() {
        GAME.currentInput = GAME.currentInput.slice(0, -1);
        UI.input.innerText = GAME.currentInput;
    }

    function clearInput() {
        GAME.currentInput = '';
        UI.input.innerText = '';
    }

    function verifyAnswer() {
        const inputVal = parseInt(GAME.currentInput);
        if (inputVal === GAME.expectedAnswer) {
            GAME.score++;
            GAME.questionsAnswered++;
            refreshTopBar();
            generateMath();
        } else if (GAME.currentInput.length >= String(GAME.expectedAnswer).length) {
            GAME.questionsAnswered++;
            clearInput();
        }
    }

    /* --- Fin de Session & Stats --- */
    function endGame() {
        clearInterval(GAME.timerInterval);
        
        const accuracy = GAME.questionsAnswered === 0 ? 0 : Math.round((GAME.score / GAME.questionsAnswered) * 100);
        UI.finalScore.innerText = GAME.score;
        UI.finalStats.innerHTML = `Précision: ${accuracy}%<br>Mode ${GAME.mode} (${GAME.selectedDuration}s)`;
        
        saveScore(GAME.score);
        showScreen('result');
    }

    function saveScore(score) {
        let history = JSON.parse(localStorage.getItem('mindmath_scores_v2')) || [];
        if (history.length >= 20) history.shift();
        history.push(score);
        localStorage.setItem('mindmath_scores_v2', JSON.stringify(history));
    }

    /* --- Graphique (Chart.js) --- */
    function renderChart() {
        const ctx = document.getElementById('historyChart').getContext('2d');
        let data = JSON.parse(localStorage.getItem('mindmath_scores_v2')) || [];
        let labels = data.length ? data.map((_, i) => i + 1) : [''];
        let chartData = data.length ? data : [0];

        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: chartData,
                    borderColor: '#06B6D4',
                    backgroundColor: 'rgba(6, 182, 212, 0.15)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointBackgroundColor: '#111111',
                    pointBorderColor: '#06B6D4',
                    pointBorderWidth: 2,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        display: true, 
                        border: { display: false },
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#A0A0A0', maxTicksLimit: 5, padding: 10, font: {size: 11} },
                        beginAtZero: true
                    }
                },
                layout: { padding: 0 }
            }
        });
    }

    // Initialisation
    window.onload = () => {
        // Le padding env() ne marche qu'en Standalone (Home Screen), on force un chart initial
        renderChart();
    };

</script>
</body>
</html>
