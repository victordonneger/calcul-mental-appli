<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MindMath">
    
    <title>MindMath - Deep Midnight</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* =========================================
           THÈME : DEEP MIDNIGHT & VARIABLES
           ========================================= */
        :root {
            --bg-base: #050507;
            --bg-surface: #121216;
            --cyan-neon: #00E5FF;
            --cyan-dim: rgba(0, 229, 255, 0.15);
            --text-main: #FFFFFF;
            --text-muted: #888890;
            --error-red: #FF2A55;
            --btn-bg: #1A1A20;
            --btn-active: #2A2A35;
        }

        /* =========================================
           RESET & ZERO SCROLL
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none; /* Empêche la sélection de texte */
        }

        html, body {
            width: 100vw;
            height: 100vh; /* Fallback */
            height: 100dvh; /* Hauteur dynamique pour mobile (clavier, barres) */
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* ZÉRO SCROLL STRICT */
            position: fixed; /* Bloque le "bounce effect" d'iOS */
        }

        /* =========================================
           SCREENS (SPA Architecture)
           ========================================= */
        #app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            /* Gestion des zones sûres iOS globales */
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: env(safe-area-inset-bottom);
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* =========================================
           ÉCRAN D'ACCUEIL
           ========================================= */
        .home-header {
            text-align: center;
            padding: 10px 20px;
            flex-shrink: 0;
        }
        
        .home-header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--cyan-neon);
            text-shadow: 0 0 10px var(--cyan-dim);
        }

        /* Graphique réduit à ~30% max */
        .chart-wrapper {
            flex: 0 1 30%; /* Ne grandit pas au-delà, rétrécit si besoin, base 30% */
            min-height: 150px;
            max-height: 250px;
            margin: 15px 20px;
            background: var(--bg-surface);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Boutons de menu bien proportionnés */
        .menu-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-auto-rows: minmax(70px, 1fr); /* Hauteur harmonisée */
            gap: 15px;
            padding: 10px 20px 30px 20px;
            align-content: center;
        }

        .btn-mode {
            background: var(--btn-bg);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background 0.1s;
        }

        .btn-mode:active {
            transform: scale(0.95);
            background: var(--btn-active);
        }

        .btn-mode.mixed {
            grid-column: span 2;
            background: var(--cyan-dim);
            color: var(--cyan-neon);
            border-color: rgba(0, 229, 255, 0.3);
        }

        /* =========================================
           ÉCRAN DE JEU
           ========================================= */
        .game-topbar {
            display: flex;
            justify-content: space-between;
            padding: 10px 30px;
            font-size: 20px;
            font-weight: 700;
            flex-shrink: 0;
            color: var(--text-muted);
        }
        
        .timer { color: var(--cyan-neon); }
        .timer.warning { color: var(--error-red); }

        /* Conteneur de calcul centré verticalement */
        .equation-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .equation {
            font-size: 60px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .user-input {
            font-size: 48px;
            color: var(--cyan-neon);
            min-height: 60px; /* Évite les sauts de layout */
            font-weight: 600;
        }

        /* Clavier ancré en bas avec gestion du Safe Area */
        .numpad {
            background: var(--bg-surface);
            padding: 20px;
            /* Le padding bottom inclut l'encoche du bas (home indicator) */
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        .key {
            background: var(--btn-bg);
            border: none;
            border-radius: 16px;
            color: var(--text-main);
            font-size: 28px;
            font-weight: 500;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }

        .key:active { background: var(--btn-active); }
        .key.action { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); font-size: 24px;}
        .key.action:active { background: rgba(255, 255, 255, 0.1); }

        /* =========================================
           ÉCRAN DE RÉSULTAT
           ========================================= */
        .result-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .score-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid var(--cyan-neon);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px var(--cyan-dim);
            margin-bottom: 30px;
        }

        .score-number { font-size: 64px; font-weight: 800; color: var(--text-main); line-height: 1;}
        .score-label { font-size: 16px; color: var(--cyan-neon); font-weight: 600;}
        .accuracy { font-size: 18px; color: var(--text-muted); margin-bottom: 40px; text-align: center; }

        .btn-large {
            background: var(--cyan-neon);
            color: var(--bg-base);
            border: none;
            border-radius: 20px;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            max-width: 300px;
            margin-bottom: max(20px, env(safe-area-inset-bottom));
        }
        .btn-large:active { opacity: 0.8; }

    </style>
</head>
<body>

<div id="app">
    
    <div id="home-screen" class="screen active">
        <div class="home-header">
            <h1>MindMath</h1>
        </div>
        <div class="chart-wrapper">
            <canvas id="chartProgress"></canvas>
        </div>
        <div class="menu-grid">
            <button class="btn-mode" onclick="startGame('Addition')">Addition</button>
            <button class="btn-mode" onclick="startGame('Soustraction')">Soustraction</button>
            <button class="btn-mode" onclick="startGame('Multiplication')">Multiplication</button>
            <button class="btn-mode" onclick="startGame('Division')">Division</button>
            <button class="btn-mode mixed" onclick="startGame('Mixte')">Mixte (60s Chrono)</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-topbar">
            <div id="ui-timer" class="timer">60s</div>
            <div id="ui-score">Score: 0</div>
        </div>
        
        <div class="equation-container">
            <div id="ui-equation" class="equation">5 + 7 =</div>
            <div id="ui-input" class="user-input"></div>
        </div>

        <div class="numpad">
            <button class="key" onclick="pressKey(1)">1</button>
            <button class="key" onclick="pressKey(2)">2</button>
            <button class="key" onclick="pressKey(3)">3</button>
            <button class="key" onclick="pressKey(4)">4</button>
            <button class="key" onclick="pressKey(5)">5</button>
            <button class="key" onclick="pressKey(6)">6</button>
            <button class="key" onclick="pressKey(7)">7</button>
            <button class="key" onclick="pressKey(8)">8</button>
            <button class="key" onclick="pressKey(9)">9</button>
            <button class="key action" onclick="clearInput()">C</button>
            <button class="key" onclick="pressKey(0)">0</button>
            <button class="key action" onclick="backspace()">⌫</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="result-content">
            <h2 style="font-size: 28px; margin-bottom: 40px; color: var(--text-main);">Session Terminée</h2>
            
            <div class="score-circle">
                <div id="ui-final-score" class="score-number">0</div>
                <div class="score-label">PTS</div>
            </div>
            
            <div id="ui-accuracy" class="accuracy">Précision: 0%<br>Mode: Mixte</div>
        </div>
        <div style="padding: 0 30px; width: 100%; display:flex; justify-content:center;">
            <button class="btn-large" onclick="goHome()">Retour à l'accueil</button>
        </div>
    </div>

</div>

<script>
    /* =========================================
       LOGIQUE D'APPLICATION (SPA)
       ========================================= */
    const screens = {
        home: document.getElementById('home-screen'),
        game: document.getElementById('game-screen'),
        result: document.getElementById('result-screen')
    };

    let state = {
        mode: '',
        score: 0,
        totalPlayed: 0,
        timeLeft: 60,
        timerId: null,
        currentAnswer: 0,
        currentInput: ''
    };

    let chartInstance = null;

    // --- NAVIGATION ---
    function switchScreen(targetName) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[targetName].classList.add('active');
    }

    function goHome() {
        initChart();
        switchScreen('home');
    }

    // --- MOTEUR DE JEU ---
    function startGame(mode) {
        state.mode = mode;
        state.score = 0;
        state.totalPlayed = 0;
        state.timeLeft = 60;
        state.currentInput = '';
        
        updateTopBar();
        document.getElementById('ui-input').innerText = '';
        switchScreen('game');
        
        nextQuestion();
        
        state.timerId = setInterval(() => {
            state.timeLeft--;
            updateTopBar();
            if (state.timeLeft <= 0) endGame();
        }, 1000);
    }

    function updateTopBar() {
        const timerEl = document.getElementById('ui-timer');
        timerEl.innerText = `${state.timeLeft}s`;
        if (state.timeLeft <= 10) timerEl.classList.add('warning');
        else timerEl.classList.remove('warning');
        
        document.getElementById('ui-score').innerText = `Score: ${state.score}`;
    }

    function nextQuestion() {
        let n1, n2, op, ans;
        let m = state.mode === 'Mixte' ? ['Addition', 'Soustraction', 'Multiplication', 'Division'][Math.floor(Math.random() * 4)] : state.mode;

        if (m === 'Addition') {
            n1 = Math.floor(Math.random() * 49) + 2; n2 = Math.floor(Math.random() * 49) + 2;
            op = '+'; ans = n1 + n2;
        } else if (m === 'Soustraction') {
            n1 = Math.floor(Math.random() * 50) + 10; n2 = Math.floor(Math.random() * n1);
            op = '-'; ans = n1 - n2;
        } else if (m === 'Multiplication') {
            n1 = Math.floor(Math.random() * 11) + 2; n2 = Math.floor(Math.random() * 11) + 2;
            op = '×'; ans = n1 * n2;
        } else { // Division
            n2 = Math.floor(Math.random() * 10) + 2; ans = Math.floor(Math.random() * 10) + 2;
            n1 = n2 * ans; op = '÷';
        }

        state.currentAnswer = ans;
        state.currentInput = '';
        document.getElementById('ui-equation').innerText = `${n1} ${op} ${n2} =`;
        document.getElementById('ui-input').innerText = '';
    }

    // --- CLAVIER & ENTRÉES ---
    function pressKey(num) {
        if (state.currentInput.length < 5) {
            state.currentInput += num;
            updateInputDisplay();
            checkAnswer();
        }
    }

    function backspace() {
        state.currentInput = state.currentInput.slice(0, -1);
        updateInputDisplay();
    }

    function clearInput() {
        state.currentInput = '';
        updateInputDisplay();
    }

    function updateInputDisplay() {
        document.getElementById('ui-input').innerText = state.currentInput;
    }

    function checkAnswer() {
        let userAns = parseInt(state.currentInput);
        if (userAns === state.currentAnswer) {
            state.score++;
            state.totalPlayed++;
            nextQuestion();
            updateTopBar();
        } else if (state.currentInput.length >= String(state.currentAnswer).length) {
            // Longueur atteinte mais faux
            state.totalPlayed++;
            clearInput();
        }
    }

    // --- FIN & PERSISTANCE ---
    function endGame() {
        clearInterval(state.timerId);
        
        let ratio = state.totalPlayed === 0 ? 0 : Math.round((state.score / state.totalPlayed) * 100);
        document.getElementById('ui-final-score').innerText = state.score;
        document.getElementById('ui-accuracy').innerHTML = `Précision: ${ratio}%<br>Mode: ${state.mode}`;
        
        saveData(state.score);
        switchScreen('result');
    }

    function saveData(score) {
        let history = JSON.parse(localStorage.getItem('mindmath_data')) || [];
        if (history.length >= 30) history.shift(); // Garde les 30 derniers
        history.push(score);
        localStorage.setItem('mindmath_data', JSON.stringify(history));
    }

    // --- GRAPHIQUE ---
    function initChart() {
        const ctx = document.getElementById('chartProgress').getContext('2d');
        let history = JSON.parse(localStorage.getItem('mindmath_data')) || [];
        
        let labels = history.length ? history.map((_, i) => `#${i+1}`) : [''];
        let data = history.length ? history : [0];

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    borderColor: '#00E5FF',
                    backgroundColor: 'rgba(0, 229, 255, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        display: true, 
                        border: { display: false },
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#888890', maxTicksLimit: 4, padding: 10 }
                    }
                },
                layout: { padding: 0 }
            }
        });
    }

    // Init au lancement
    window.onload = initChart;

</script>
</body>
</html>
