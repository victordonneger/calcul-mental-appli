<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MindMath Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #09090B;
            --surface: #18181B;
            --accent: #06B6D4; /* Cyan */
            --accent-glow: rgba(6, 182, 212, 0.3);
            --text-main: #FAFAFA;
            --text-dim: #A1A1AA;
            --danger: #EF4444;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            height: 100vh; overflow: hidden;
        }

        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .hidden { display: none !important; }

        /* Timer Progress Bar */
        .progress-container {
            width: 100%; height: 6px; background: #27272A; border-radius: 3px; overflow: hidden; margin-top: 10px;
        }
        #progressBar {
            width: 100%; height: 100%; background: var(--accent); transition: width 1s linear;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Config Styles */
        .config-card { background: var(--surface); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .time-picker { display: flex; gap: 10px; margin-top: 10px; }
        .time-btn {
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #3F3F46;
            background: transparent; color: var(--text-main); font-weight: bold;
        }
        .time-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg-dark); }

        /* Game Area */
        .equation { font-size: 5rem; font-weight: 800; text-align: center; margin: 40px 0; font-variant-numeric: tabular-nums; }
        .answer-slot { font-size: 3.5rem; color: var(--accent); text-align: center; min-height: 80px; font-weight: 600; }

        /* Numpad Custom */
        .numpad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: auto; padding-bottom: 20px;
        }
        .key {
            background: var(--surface); border: none; border-radius: 15px; color: var(--text-main);
            font-size: 1.8rem; font-weight: 600; padding: 20px 0; transition: 0.1s;
        }
        .key:active { background: #27272A; transform: scale(0.95); }
        .key.special { color: var(--text-dim); background: #27272A; }

        /* Stats Chart */
        .chart-box { background: var(--surface); border-radius: 20px; padding: 15px; flex-grow: 1; min-height: 200px; margin: 15px 0; }
        
        .btn-start {
            background: var(--accent); color: var(--bg-dark); border: none; padding: 20px;
            border-radius: 15px; font-size: 1.2rem; font-weight: 800; width: 100%; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="home" class="screen">
        <h1 style="font-size: 2rem; margin-bottom: 5px;">MindMath <span style="color: var(--accent);">Pro</span></h1>
        
        <div class="chart-box">
            <canvas id="progressChart"></canvas>
        </div>

        <div class="config-card">
            <p style="color: var(--text-dim); font-size: 0.9rem;">DURÉE DE LA SESSION</p>
            <div class="time-picker">
                <button class="time-btn" onclick="setDuration(30, this)">30s</button>
                <button class="time-btn active" onclick="setDuration(60, this)">60s</button>
                <button class="time-btn" onclick="setDuration(120, this)">120s</button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="time-btn" onclick="start('Addition')">Addition</button>
            <button class="time-btn" onclick="start('Multiplication')">Multi</button>
            <button class="time-btn" onclick="start('Soustraction')">Sous</button>
            <button class="time-btn" onclick="start('Division')">Div</button>
        </div>
        <button class="btn-start" onclick="start('Mixte')">MODE MIXTE</button>
    </div>

    <div id="game" class="screen hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span id="timerTxt" style="font-weight: bold; font-family: monospace;">60s</span>
            <span id="scoreTxt" style="color: var(--accent);">Score: 0</span>
        </div>
        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

        <div class="equation" id="eq">--</div>
        <div class="answer-slot" id="ans"></div>

        <div class="numpad">
            <button class="key" onclick="press(1)">1</button><button class="key" onclick="press(2)">2</button><button class="key" onclick="press(3)">3</button>
            <button class="key" onclick="press(4)">4</button><button class="key" onclick="press(5)">5</button><button class="key" onclick="press(6)">6</button>
            <button class="key" onclick="press(7)">7</button><button class="key" onclick="press(8)">8</button><button class="key" onclick="press(9)">9</button>
            <button class="key special" onclick="clr()">C</button><button class="key" onclick="press(0)">0</button><button class="key special" onclick="del()">⌫</button>
        </div>
    </div>

    <div id="results" class="screen hidden" style="text-align: center; justify-content: center;">
        <h2 style="font-size: 3rem;">FIN !</h2>
        <p id="resDetail" style="color: var(--text-dim); margin-bottom: 40px;"></p>
        <button class="btn-start" onclick="location.reload()">RETOUR</button>
    </div>

    <script>
        let duration = 60;
        let timeRemaining = 60;
        let score = 0, total = 0, currentAns = 0, input = "", timer;
        let mode = "";

        function setDuration(s, btn) {
            duration = s;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function start(m) {
            mode = m; score = 0; total = 0; timeRemaining = duration; input = "";
            document.getElementById('home').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            next();
            timer = setInterval(tick, 1000);
        }

        function tick() {
            timeRemaining--;
            document.getElementById('timerTxt').innerText = timeRemaining + "s";
            document.getElementById('progressBar').style.width = (timeRemaining / duration * 100) + "%";
            if (timeRemaining <= 10) document.getElementById('progressBar').style.background = "var(--danger)";
            if (timeRemaining <= 0) end();
        }

        function next() {
            let n1 = Math.floor(Math.random() * 12) + 1;
            let n2 = Math.floor(Math.random() * 12) + 1;
            let op = mode === 'Mixte' ? ['+','-','*','/'][Math.floor(Math.random()*4)] : (mode==='Addition'?'+':(mode==='Soustraction'?'-':(mode==='Multiplication'?'*':'/')));
            
            if(op === '+') { currentAns = n1 + n2; document.getElementById('eq').innerText = `${n1}+${n2}`; }
            if(op === '-') { let a = Math.max(n1,n2), b = Math.min(n1,n2); currentAns = a - b; document.getElementById('eq').innerText = `${a}-${b}`; }
            if(op === '*') { currentAns = n1 * n2; document.getElementById('eq').innerText = `${n1}×${n2}`; }
            if(op === '/') { let res = n1; n1 = n1 * n2; currentAns = n2; document.getElementById('eq').innerText = `${n1}÷${res}`; }
            input = ""; document.getElementById('ans').innerText = "";
        }

        function press(d) {
            input += d; document.getElementById('ans').innerText = input;
            if (parseInt(input) === currentAns) {
                score++; total++; document.getElementById('scoreTxt').innerText = "Score: " + score;
                setTimeout(next, 150);
            } else if (input.length >= currentAns.toString().length) {
                total++; setTimeout(() => { input = ""; document.getElementById('ans').innerText = ""; }, 200);
            }
        }
        function clr() { input = ""; document.getElementById('ans').innerText = ""; }
        function del() { input = input.slice(0, -1); document.getElementById('ans').innerText = input; }

        function end() {
            clearInterval(timer);
            document.getElementById('game').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            let acc = total > 0 ? Math.round(score/total*100) : 0;
            document.getElementById('resDetail').innerText = `${score} points (${acc}% de précision)`;
            save(score, acc);
        }

        function save(s, a) {
            let h = JSON.parse(localStorage.getItem('math_h')) || [];
            h.push({ d: new Date().toLocaleDateString('fr'), s: s });
            localStorage.setItem('math_h', JSON.stringify(h.slice(-20)));
        }

        window.onload = () => {
            let h = JSON.parse(localStorage.getItem('math_h')) || [];
            new Chart(document.getElementById('progressChart'), {
                type: 'line',
                data: {
                    labels: h.map(x => x.d),
                    datasets: [{ label: 'Score', data: h.map(x => x.s), borderColor: '#06B6D4', tension: 0.4, fill: true, backgroundColor: 'rgba(6, 182, 212, 0.1)' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#27272A' } }, x: { display: false } } }
            });
        };
    </script>
</body>
</html>
